# =============================================================
# Alertmanager Configuration
# Receives alerts from Prometheus and routes them to receivers.
# Current notification channel: Email (SMTP)
# =============================================================

global:
  resolve_timeout: 5m

  smtp_smarthost: smtp.gmail.com:587
  smtp_from: devsecops.incidents@gmail.com
  smtp_auth_username: devsecops.incidents@gmail.com
  smtp_auth_password: ${SMTP_PASSWORD}
  smtp_require_tls: true

# =============================================================
# Alert Routing
# =============================================================

route:
  receiver: default-receiver

  group_by:
    - alertname
    - severity
    - application

  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

  routes:

    # Security incidents
    - matchers:
        - category="security"
      receiver: security-receiver

    # Critical alerts
    - matchers:
        - severity="critical"
      receiver: critical-receiver

    # Infrastructure alerts
    - matchers:
        - layer="infrastructure"
      receiver: infrastructure-receiver

# =============================================================
# Alert Suppression
# =============================================================

inhibit_rules:

  # If a service is down, suppress its performance alerts.
  - source_matchers:
      - alertname="ServiceDown"

    target_matchers:
      - severity="warning"

    equal:
      - application

# =============================================================
# Receivers
# =============================================================

receivers:

  - name: default-receiver
    email_configs:
      - to: "devsecops.team@gmail.com"
        send_resolved: true

  - name: critical-receiver
    email_configs:
      - to: "devsecops.team@gmail.com"
        send_resolved: true

  - name: security-receiver
    email_configs:
      - to: "devsecops.team@gmail.com"
        send_resolved: true

  - name: infrastructure-receiver
    email_configs:
      - to: "devsecops.team@gmail.com"
        send_resolved: true