# =============================================================
# INFRASTRUCTURE LAYER
# PostgreSQL (x5) + MinIO + Keycloak
# Secrets injected from GitHub Secrets via Pipeline 2
# =============================================================

services:

  # ===========================================================
  # DATABASES - One PostgreSQL per service
  # ===========================================================

  postgres-incident:
    image: postgres:15
    container_name: postgres-incident
    restart: unless-stopped
    environment:
      POSTGRES_DB: incidents_db
      POSTGRES_USER: ${INCIDENT_DB_USER}
      POSTGRES_PASSWORD: ${INCIDENT_DB_PASSWORD}
    volumes:
      - postgres_incident_data:/var/lib/postgresql/data
    networks:
      - incidents-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INCIDENT_DB_USER} -d incidents_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  postgres-user:
    image: postgres:15
    container_name: postgres-user
    restart: unless-stopped
    environment:
      POSTGRES_DB: service_user_db
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - incidents-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d service_user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  postgres-comment:
    image: postgres:15
    container_name: postgres-comment
    restart: unless-stopped
    environment:
      POSTGRES_DB: comment_db
      POSTGRES_USER: ${COMMENT_DB_USER}
      POSTGRES_PASSWORD: ${COMMENT_DB_PASSWORD}
    volumes:
      - postgres_comment_data:/var/lib/postgresql/data
    networks:
      - incidents-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COMMENT_DB_USER} -d comment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  postgres-chat:
    image: postgres:15
    container_name: postgres-chat
    restart: unless-stopped
    environment:
      POSTGRES_DB: chat_db
      POSTGRES_USER: ${CHAT_DB_USER}
      POSTGRES_PASSWORD: ${CHAT_DB_PASSWORD}
    volumes:
      - postgres_chat_data:/var/lib/postgresql/data
    networks:
      - incidents-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CHAT_DB_USER} -d chat_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  postgres-keycloak:
    image: postgres:15
    container_name: postgres-keycloak
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    networks:
      - incidents-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d keycloak_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ===========================================================
  # MINIO - Object Storage
  # ===========================================================

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - incidents-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    restart: no
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - incidents-network
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/incidents;
        mc mb --ignore-existing local/commentaires-pieces-jointes;
        mc policy set public local/incidents;
        echo 'MinIO buckets ready.';
      "
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ===========================================================
  # KEYCLOAK - Authentication & Authorization
  # ===========================================================

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm --spi-importer-strategy=OVERWRITE_EXISTING
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak_db
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/incidents-realm.json:/opt/keycloak/data/import/incidents-realm.json
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - incidents-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.50'
          memory: 512M

# ===========================================================
# VOLUMES - Persistent data storage
# ===========================================================

volumes:
  postgres_incident_data:
    name: postgres_incident_data
  postgres_user_data:
    name: postgres_user_data
  postgres_comment_data:
    name: postgres_comment_data
  postgres_chat_data:
    name: postgres_chat_data
  postgres_keycloak_data:
    name: postgres_keycloak_data
  minio_data:
    name: minio_data
  keycloak_data:
    name: keycloak_data

# ===========================================================
# NETWORKS
# ===========================================================

networks:
  incidents-network:
    name: incidents-network
    driver: bridge